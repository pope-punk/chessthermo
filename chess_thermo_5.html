<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Thermodynamics Engine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
}
#app {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
    gap: 24px;
    padding: 20px;
    align-items: flex-start;
}
#left-panel { flex: 0 0 auto; max-width: 548px; }
#right-panel {
    flex: 1;
    min-width: 310px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
}
h1 { font-size: 1.4em; margin-bottom: 10px; color: #7ec8e3; }
h2 {
    font-size: 1.05em;
    margin: 14px 0 6px;
    color: #7ec8e3;
    border-bottom: 1px solid #2a2a3e;
    padding-bottom: 4px;
}
.h2-sub {
    font-size: 0.75em;
    color: #666;
    font-weight: normal;
    display: block;
    margin-top: 2px;
}
#status {
    margin-bottom: 10px;
    padding: 8px 12px;
    background: #16213e;
    border-radius: 6px;
    font-size: 0.9em;
    min-height: 36px;
}
#board-container {
    display: inline-block;
    border: 2px solid #3a3a5e;
    border-radius: 4px;
    overflow: hidden;
}
.board-row { display: flex; }
.cell {
    width: 68px; height: 68px;
    display: flex; align-items: center; justify-content: center;
    font-size: 46px; cursor: pointer; user-select: none;
    position: relative; transition: opacity 0.1s;
    color: #1a1a1a; text-shadow: 0 0 2px rgba(0,0,0,0.3);
}
.light { background: #f0d9b5; }
.dark { background: #b58863; }
.cell:hover { opacity: 0.88; }
.cell.selected { box-shadow: inset 0 0 0 3.5px #3355dd; }
.cell.legal-dot::after {
    content: ''; position: absolute;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.22); border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    pointer-events: none;
}
.cell.legal-capture { box-shadow: inset 0 0 0 4px rgba(0,0,0,0.22); }
.light.last-move { background: #cdd26a; }
.dark.last-move { background: #aaa23a; }
.light.last-move.selected { background: #cdd26a; box-shadow: inset 0 0 0 3.5px #3355dd; }
.dark.last-move.selected { background: #aaa23a; box-shadow: inset 0 0 0 3.5px #3355dd; }
.coord-label { font-size: 10px; position: absolute; pointer-events: none; font-weight: 600; }
.file-label { bottom: 2px; right: 4px; }
.rank-label { top: 2px; left: 4px; }
.light .coord-label { color: #b58863; }
.dark .coord-label { color: #f0d9b5; }
#controls {
    margin-top: 10px; display: flex; gap: 8px;
    flex-wrap: wrap; align-items: center;
}
button, select {
    padding: 6px 12px; background: #16213e; color: #e0e0e0;
    border: 1px solid #3a3a5e; border-radius: 5px;
    cursor: pointer; font-size: 0.85em; font-family: inherit;
}
button:hover { background: #1e3050; }
select:focus, button:focus { outline: 1px solid #7ec8e3; }
input[type="range"] {
    width: 80px; vertical-align: middle; accent-color: #7ec8e3;
    cursor: pointer; margin: 0 4px;
}
#heatCapVal { font-family: 'Consolas','Menlo',monospace; font-size: 0.85em; color: #7ec8e3; min-width: 2em; display: inline-block; }
label { font-size: 0.85em; }
#move-list {
    margin-top: 10px; padding: 8px 10px;
    background: #16213e; border-radius: 6px;
    font-family: 'Consolas','Menlo',monospace; font-size: 0.84em;
    max-height: 110px; overflow-y: auto; overflow-x: hidden;
    line-height: 1.7; overflow-wrap: break-word; word-break: break-word;
}
.dash-section {
    background: #16213e; border-radius: 6px;
    padding: 10px 12px; margin-bottom: 8px;
}
.dash-grid {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    gap: 3px 10px;
    font-family: 'Consolas','Menlo',monospace; font-size: 0.84em;
    align-items: baseline;
}
.dash-label { color: #999; white-space: nowrap; }
.dash-value { color: #7ec8e3; text-align: right; font-variant-numeric: tabular-nums; }
.prob-table {
    width: 100%; border-collapse: collapse;
    font-family: 'Consolas','Menlo',monospace; font-size: 0.8em;
}
.prob-table th {
    text-align: left; color: #888; padding: 2px 6px;
    border-bottom: 1px solid #2a2a3e; font-weight: normal;
}
.prob-table td { padding: 2px 6px; }
.prob-bar-cell { width: 35%; }
.prob-bar {
    height: 13px;
    background: linear-gradient(90deg, #7ec8e3, #5ba3c0);
    border-radius: 2px; min-width: 2px;
}
.best-move-row td { color: #c8e37e; }
#promotion-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
}
#promotion-modal.active { display: flex; }
.promo-choices {
    display: flex; gap: 10px; background: #16213e;
    padding: 18px; border-radius: 10px; border: 2px solid #7ec8e3;
}
.promo-piece {
    width: 68px; height: 68px;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px; cursor: pointer;
    background: #f0d9b5; border-radius: 6px; transition: transform 0.1s;
}
.promo-piece:hover { transform: scale(1.08); background: #e0c9a5; }
.graph-controls {
    display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.graph-controls select { padding: 3px 8px; font-size: 0.8em; }
#graph-canvas { width: 100%; height: 150px; display: block; }
@media (max-width: 960px) {
    #app { flex-direction: column; align-items: center; }
    #right-panel { min-width: unset; width: 100%; max-width: 560px; max-height: unset; }
}
@media (max-width: 600px) {
    .cell { width: 48px; height: 48px; font-size: 32px; }
    #app { padding: 10px; gap: 12px; }
}
</style>
</head>
<body>

<div id="app">
<div id="left-panel">
    <h1>&#9812; Chess Thermodynamics</h1>
    <div id="status">Your move (White)</div>
    <div id="board-container"><div id="board"></div></div>
    <div id="controls">
        <button onclick="newGame()">New Game</button>
        <button onclick="undoMove()">Undo</button>
        <button onclick="flipBoard()">Flip</button>
        <button onclick="switchSides()">Switch Sides</button>
        <select id="difficulty">
            <option value="easy">Easy (10K)</option>
            <option value="medium" selected>Medium (50K)</option>
            <option value="hard">Hard (200K)</option>
            <option value="max">Max (1M)</option>
        </select>
        <label>Depth:
            <select id="dashDepth" onchange="updateDashboard()">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </label>
        <label>C: <input type="range" id="heatCap" min="0.5" max="5" step="0.1" value="1.0"
            oninput="onHeatCapChange(this.value)"><span id="heatCapVal">1.0</span>
        </label>
    </div>
    <div id="move-list">Game start</div>
</div>

<div id="right-panel">
    <h2>Thermodynamic State
        <span class="h2-sub">Q = &minus;E convention; F maximized</span>
    </h2>
    <div id="dash-thermo" class="dash-section"><div class="dash-grid" id="thermo-grid"></div></div>

    <h2>Move Analysis
        <span class="h2-sub">Per-move thermodynamic state &amp; Stockfish comparison</span>
    </h2>
    <div id="dash-movehistory" class="dash-section" style="max-height:240px;overflow-y:auto"></div>

    <h2>Evaluation Weights &pi;<sub>a</sub>
        <span class="h2-sub">Engine plays argmax Q; weights show competitive moves</span>
    </h2>
    <div id="dash-moves" class="dash-section" style="max-height:320px;overflow-y:auto"></div>

    <h2>History</h2>
    <div class="dash-section">
        <div class="graph-controls">
            <select id="graphVar" onchange="renderGraph()">
                <option value="eval" selected>Eval (&#9817;)</option>
                <option value="T">T</option>
                <option value="S">S</option>
            </select>
        </div>
        <canvas id="graph-canvas"></canvas>
    </div>
</div>
</div>

<div id="promotion-modal"><div class="promo-choices" id="promo-choices"></div></div>

            case 'p': { let c=0,dir=color==='w'?1:-1,nr=rank+dir; if (nr>=0&&nr<=7) { c++; if (file>0) c++; if (file<7) c++; } if (rank===(color==='w'?1:6)) { if (rank+2*dir>=0&&rank+2*dir<=7) c++; } return c; }
        }
        return 0;
    }
    for (const color of ['w','b'])
        for (const type of ['p','n','b','r','q','k']) {
            const t = new Int8Array(64);
            const base = PIECE_VALUE[type];
            for (let rank=0;rank<8;rank++) for (let file=0;file<8;file++) t[rank*8+file]=base+xm(type,file,rank,color);
            XRAY[color+type] = t;
        }
})();

// ── Transposition Cache ────────────────────────────────────
let thermoCache = new Map();
const THERMO_CACHE_MAX = 100000;

// ── X-ray evaluation: split by color ───────────────────────
function rawU(g) {
    return g.fast_raw_u_split ? g.fast_raw_u_split(XRAY) : rawU_slow(g);
}
function rawU_slow(g) {
    let Uw=0, Ub=0;
    const b = g.board();
    for (let row=0;row<8;row++) for (let col=0;col<8;col++) {

// ── Quiescence Search ──────────────────────────────────────
// Resolves captures and promotions to reach a quiet position
// before applying the static XRAY evaluation. Positions with
// pending captures are far from equilibrium; computing
// thermodynamic state variables for them is meaningless.
// Alpha-beta is used here (not Boltzmann) because quiescence
// enumerates tactical sequences exhaustively.
function quiesce(g, alpha, beta) {
    nodeCount++;
    const inCheck = g.fast_in_check();

    if (!inCheck) {
        const standPat = g.fast_raw_u(XRAY);
        if (standPat >= beta) return standPat;
        if (standPat > alpha) alpha = standPat;
    }

    // In check: all evasions. Not in check: captures and promotions only.
    const moves = inCheck ? g.fast_moves() : g.fast_captures();
    if (moves.length === 0) return inCheck ? -CHECKMATE_SCORE : alpha;

    for (let i = 0; i < moves.length; i++) {
        g.fast_make(moves[i]);
        const score = -quiesce(g, -beta, -alpha);
        g.fast_undo();
        if (score >= beta) return score;
        if (score > alpha) alpha = score;
    }

    return alpha;
}

// ── Self-Consistent Temperature ────────────────────────────
// Finds the fixed point of T = σ_π(T) / √C, where σ_π is the
// standard deviation of Q under the Boltzmann distribution at
// temperature T. At convergence, Var(Q)/T² = C (the heat
// capacity). C is set by the user:
//   C < 1 → T amplified → broader distribution → exploratory
//   C > 1 → T suppressed → sharper distribution → decisive
//   C = 1 → T = σ (original behavior)
//
// Phase 1: MAD for outlier-robust initial estimate.
// Phase 2: Iterate Boltzmann-weighted σ until convergence.
// madFloor=true floors the iteration at the MAD estimate,
// preventing the collapse to S=0. Used for dashboard display
// only — the search uses madFloor=false (T_FLOOR) so that
// F = T ln Z stays energy-dominated at internal nodes.
function robustT(Qs, n, madFloor) {
    const sqrtC = Math.sqrt(activeC);
    const tmp = new Array(n);
    for (let i=0;i<n;i++) tmp[i]=Qs[i];
    tmp.sort((a,b) => a-b);
    const med = n&1 ? tmp[n>>1] : (tmp[(n>>1)-1]+tmp[n>>1])*0.5;
    for (let i=0;i<n;i++) tmp[i]=Math.abs(Qs[i]-med);
    tmp.sort((a,b) => a-b);
    const mad = n&1 ? tmp[n>>1] : (tmp[(n>>1)-1]+tmp[n>>1])*0.5;
    const madT = Math.max(1.4826*mad / sqrtC, T_FLOOR);
    const iterFloor = madFloor ? madT : T_FLOOR;
    let T = madT;

    let maxQ=Qs[0];
    for (let i=1;i<n;i++) if (Qs[i]>maxQ) maxQ=Qs[i];

    for (let iter=0; iter<8; iter++) {
        let expSum=0;
        for (let i=0;i<n;i++) { tmp[i]=Math.exp((Qs[i]-maxQ)/T); expSum+=tmp[i]; }
        let avgQ=0, avgQ2=0;
        for (let i=0;i<n;i++) { const p=tmp[i]/expSum; avgQ+=p*Qs[i]; avgQ2+=p*Qs[i]*Qs[i]; }
        const sigW = Math.sqrt(Math.max(avgQ2 - avgQ*avgQ, 0));
        const Tnew = Math.max(sigW / sqrtC, iterFloor);
        if (Math.abs(Tnew-T) < 0.01) break;
        T = Math.max(Math.sqrt(T*Tnew), iterFloor);
    }
    return T;
}

// ── Thermodynamic Search: F = T ln Z ───────────────────────
// Unified search at all depths. Both sides computed identically
// (equilibrium requires symmetry).
//   depth ≤ 0: quiescence search (alpha-beta over captures)
//   depth 1–2: full Boltzmann evaluation of all moves
//   depth ≥ 3: Boltzmann pruning + importance-sampled tail
//
// Draw detection via pathKeys set: if the current position
// has appeared earlier on the search path, return 0 (draw).
function thermoSearch(g, depth, pathKeys) {
    nodeCount++;

    // Node hard limit: degrade gracefully
    if (nodeCount > NODE_HARD_LIMIT && depth > 1) depth = 1;

    // Periodic time check (every 4096 nodes) for responsiveness
    if ((nodeCount & 0xFFF) === 0 && performance.now() > searchDeadline) return 0;

    // Leaf / horizon: quiescence → XRAY eval (ideal-gas limit)
    if (depth <= 0) return quiesce(g, -Infinity, Infinity);

    const posKey = g.fast_hash();

    // Draw detection: repetition on current search path
    if (pathKeys.has(posKey)) return 0;

    // Transposition table lookup
    const key = depth + ':' + posKey;
    const cached = thermoCache.get(key);
    if (cached !== undefined) return cached;

    const moves = g.fast_moves();
    const n = moves.length;
    if (n === 0) {
        const v = g.fast_in_check() ? -CHECKMATE_SCORE : 0;
        if (thermoCache.size < THERMO_CACHE_MAX) thermoCache.set(key, v);
        return v;
    }

    let Qs;

    if (depth <= 2) {
        // Full evaluation of all moves
        Qs = new Array(n);
        pathKeys.add(posKey);
        for (let i = 0; i < n; i++) {
            g.fast_make(moves[i]);
            Qs[i] = -thermoSearch(g, depth - 1, pathKeys);
            g.fast_undo();
        }
        pathKeys.delete(posKey);
    } else {
        // Depth ≥ 3: Boltzmann pruning with MC tail sampling
        const quickQs = new Array(n);
        pathKeys.add(posKey);
        for (let i = 0; i < n; i++) {
            g.fast_make(moves[i]);
            quickQs[i] = -thermoSearch(g, depth - 2, pathKeys);
            g.fast_undo();
        }

        let qMax = quickQs[0];
        for (let i = 1; i < n; i++) if (quickQs[i] > qMax) qMax = quickQs[i];

        const T_est = robustT(quickQs, n);
        const threshold = qMax - BOLTZ_SIGMA * T_est;

        const exactIdx = [];
        const samplePool = [];
        for (let i = 0; i < n; i++) {
            if (quickQs[i] >= threshold) exactIdx.push(i);
            else samplePool.push(i);
        }

        Qs = quickQs.slice();

        for (let i = 0; i < exactIdx.length; i++) {
            const idx = exactIdx[i];
            g.fast_make(moves[idx]);
            Qs[idx] = -thermoSearch(g, depth - 1, pathKeys);
            g.fast_undo();
        }

        // Adaptive MC sampling: up to 20% of tail, capped at 8
        const mcSamples = Math.min(Math.ceil(samplePool.length * 0.2), 8);
        if (mcSamples > 0 && samplePool.length > 0) {
            let sMaxQ = quickQs[samplePool[0]];
            for (let j = 1; j < samplePool.length; j++)
                if (quickQs[samplePool[j]] > sMaxQ) sMaxQ = quickQs[samplePool[j]];

            const weights = new Array(samplePool.length);
            let wSum = 0;
            for (let j = 0; j < samplePool.length; j++) {
                weights[j] = Math.exp((quickQs[samplePool[j]] - sMaxQ) / T_est);
                wSum += weights[j];
            }

            const picked = new Uint8Array(samplePool.length);
            for (let k = 0; k < mcSamples && wSum > 1e-30; k++) {
                let r = Math.random() * wSum;
                let chosen = -1;
                for (let j = 0; j < samplePool.length; j++) {
                    if (picked[j]) continue;
                    r -= weights[j];
                    if (r <= 0) { chosen = j; break; }
                }
                if (chosen < 0) {
                    for (let j = samplePool.length - 1; j >= 0; j--)
                        if (!picked[j]) { chosen = j; break; }
                }
                if (chosen < 0) break;
                picked[chosen] = 1;
                wSum -= weights[chosen];

                const idx = samplePool[chosen];
                g.fast_make(moves[idx]);
                Qs[idx] = -thermoSearch(g, depth - 1, pathKeys);
                g.fast_undo();
            }
        }

        pathKeys.delete(posKey);
    }

    return computeF(Qs, n, key);
}

function computeF(Qs, n, cacheKey) {
    const T = robustT(Qs, n);
    let maxQ = Qs[0];
    for (let i = 1; i < n; i++) if (Qs[i] > maxQ) maxQ = Qs[i];
    if (!Number.isFinite(maxQ)) {
        if (cacheKey && thermoCache.size < THERMO_CACHE_MAX) thermoCache.set(cacheKey, maxQ);
        return maxQ;
    }
    let expSum = 0;
    for (let i = 0; i < n; i++) expSum += Math.exp((Qs[i] - maxQ) / T);
    const val = maxQ + T * Math.log(expSum);
    if (cacheKey && thermoCache.size < THERMO_CACHE_MAX) thermoCache.set(cacheKey, val);
    return val;
}

// ── Full Thermodynamic State (dashboard analysis) ──────────
function computeThermodynamics(g, depth) {
    const rawMoves = g.fast_moves();
    if (rawMoves.length === 0) return null;

    const pathKeys = new Set();
    const posKey = g.fast_hash();
    pathKeys.add(posKey);

    const Qs = new Array(rawMoves.length);
    const moveNames = new Array(rawMoves.length);
    const fromSqs = new Array(rawMoves.length);
    for (let i = 0; i < rawMoves.length; i++) {
        moveNames[i] = g.fast_to_san(rawMoves[i]);
        fromSqs[i] = g.fast_algebraic(rawMoves[i].from);
        g.fast_make(rawMoves[i]);
        Qs[i] = -thermoSearch(g, depth - 1, pathKeys);
        g.fast_undo();
    }
    pathKeys.delete(posKey);

    const n = Qs.length;
    const T = robustT(Qs, n, true);
    let maxQ = Qs[0], bestIdx = 0;
    for (let i = 1; i < n; i++) if (Qs[i] > maxQ) { maxQ = Qs[i]; bestIdx = i; }

    const expTerms = new Array(n);
    let expSum = 0;
    for (let i = 0; i < n; i++) { expTerms[i] = Math.exp((Qs[i]-maxQ)/T); expSum += expTerms[i]; }

    const F = maxQ + T * Math.log(expSum);
    const probs = new Array(n);
    for (let i = 0; i < n; i++) probs[i] = expTerms[i] / expSum;

    let avgQ = 0, S = 0;
    for (let i = 0; i < n; i++) {
        avgQ += probs[i] * Qs[i];
        if (probs[i] > 1e-15) S -= probs[i] * Math.log(probs[i]);
    }
    const TS = T * S;

    return { T, F, S, avgQ, TS, probs, moves: moveNames, fromSqs, Qs, bestIdx };
}

let sfWorker = null;

async function initStockfish() {

        const js = await r.text();

function onSfMessage(e) {
    const line = typeof e.data === 'string' ? e.data : '';
    if (line === 'uciok') {
        sfWorker.postMessage('isready');
    } else if (line === 'readyok') {
        sfReady = true; sfBusy = false;
        processSfQueue();
    } else if (line.startsWith('info') && line.includes(' depth ')) {
        const cp = line.match(/\bcp (-?\d+)/);
        const mate = line.match(/\bmate (-?\d+)/);
        if (cp) sfCurrentScore = parseInt(cp[1]) / 100;
        else if (mate) sfCurrentScore = parseInt(mate[1]) > 0 ? 999 : -999;

        if (sfCurrentIdx >= 0 && sfCurrentIdx < graphData.length) {
            const d = graphData[sfCurrentIdx];
            graphData[sfCurrentIdx].sfEval = (d.side === 'w') ? sfCurrentScore : -sfCurrentScore;
            renderMoveTable();
        }
        sfBusy = false; sfCurrentIdx = -1;
        processSfQueue();
    }
}

function processSfQueue() {
    if (!sfReady || sfBusy || sfQueue.length === 0) return;
    const { idx, fen } = sfQueue.shift();
    sfCurrentIdx = idx;
    sfCurrentScore = null;
    sfBusy = true;
    sfWorker.postMessage('position fen ' + fen);
    sfWorker.postMessage('go depth 12');
}

    sfQueue.push({ idx, fen });

}

// ── Iterative Deepening ────────────────────────────────────
function bestMove(g, timeLimitMs) {
    const deadline = performance.now() + timeLimitMs;
    nodeCount = 0;
    thermoCache = new Map();
    activeC = parseFloat((document.getElementById('heatCap') || {}).value) || 1;

    const moves = g.fast_moves();
    const n = moves.length;
    if (n === 0) return null;
    if (n === 1) {
        searchStats = { depth: 1, nodes: 1 };
        return g.fast_to_san(moves[0]);
    }

    let bestIdx = 0;
    let reachedDepth = 0;
    const pathKeys = new Set();
    const rootPosKey = g.fast_hash();

    for (let depth = 1; depth <= 64; depth++) {
        const Qs = new Array(n);
        let timedOut = false;

        pathKeys.clear();
        pathKeys.add(rootPosKey);

        for (let i = 0; i < n; i++) {
            g.fast_make(moves[i]);
            Qs[i] = -thermoSearch(g, depth - 1, pathKeys);
            g.fast_undo();

            if (performance.now() > deadline) { timedOut = true; break; }
        }

        if (timedOut && reachedDepth > 0) break;

        bestIdx = 0;
        for (let i = 1; i < n; i++) if (Qs[i] > Qs[bestIdx]) bestIdx = i;
        reachedDepth = depth;

        // Reorder moves by Q for next iteration (best first → better timeout behavior)
        if (depth < 64) {
            const order = [];
            for (let i = 0; i < n; i++) order.push(i);
            order.sort((a, b) => Qs[b] - Qs[a]);
            const newMoves = new Array(n);
            for (let i = 0; i < n; i++) newMoves[i] = moves[order[i]];
            for (let i = 0; i < n; i++) moves[i] = newMoves[i];
            bestIdx = 0; // best move is now first after reordering
        }

        if (performance.now() > deadline) break;
        if (nodeCount > NODE_HARD_LIMIT) break;
    }

    searchStats = { depth: reachedDepth, nodes: nodeCount };
    return g.fast_to_san(moves[bestIdx]);
}

// buildRootThermo: used only by computeThermodynamics (dashboard) now
function buildRootThermo(g, rawMoves, Qs, depth) {
    const n = rawMoves.length;
    const T = robustT(Qs, n);

    let maxQ = Qs[0], bestIdx = 0;
    for (let i = 1; i < n; i++) if (Qs[i] > maxQ) { maxQ = Qs[i]; bestIdx = i; }

    const expTerms = new Array(n);
    let expSum = 0;
    for (let i = 0; i < n; i++) { expTerms[i] = Math.exp((Qs[i]-maxQ)/T); expSum += expTerms[i]; }

    const F = maxQ + T * Math.log(expSum);
    const probs = new Array(n);
    for (let i = 0; i < n; i++) probs[i] = expTerms[i] / expSum;

    let avgQ = 0, S = 0;
    for (let i = 0; i < n; i++) {
        avgQ += probs[i] * Qs[i];
        if (probs[i] > 1e-15) S -= probs[i] * Math.log(probs[i]);
    }
    const TS = T * S;

    const moveNames = new Array(n);
    const fromSqs = new Array(n);
    for (let i = 0; i < n; i++) {
        moveNames[i] = g.fast_to_san(rawMoves[i]);
        fromSqs[i] = g.fast_algebraic(rawMoves[i].from);
    }

    return { T, F, S, avgQ, TS, probs, moves: moveNames, fromSqs, Qs, bestIdx, depth };
}

// ── Board Rendering ────────────────────────────────────────
function sqId(file, rank) { return String.fromCharCode(97+file)+(rank+1); }

function renderBoard() {
    if (!boardCells) initBoard();
    const b = game.board();
    for (let dr = 0; dr < 8; dr++) {
        for (let dc = 0; dc < 8; dc++) {
            const cell = boardCells[dr * 8 + dc];
            const row = boardFlipped ? 7 - dr : dr;
            const col = boardFlipped ? 7 - dc : dc;
            const rank = 7 - row, file = col;
            const sq = sqId(file, rank);
            const piece = b[row][col];
            let cls = 'cell ' + ((row + col) % 2 === 0 ? 'light' : 'dark');
            if (lastMoveSquares && (sq === lastMoveSquares.from || sq === lastMoveSquares.to)) cls += ' last-move';
            if (sq === selectedSq) cls += ' selected';
            if (selectedSq && legalTargets.indexOf(sq) >= 0) cls += piece ? ' legal-capture' : ' legal-dot';
            cell.className = cls;
            cell._sq = sq;
            const ch = piece ? PIECE_CHAR[piece.color + piece.type] : '';
            if (cell._pc.textContent !== ch) cell._pc.textContent = ch;
            if (cell._rl) cell._rl.textContent = rank + 1;
            if (cell._fl) cell._fl.textContent = String.fromCharCode(97 + file);
        }
    }
}
function initBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    boardCells = [];
    for (let dr = 0; dr < 8; dr++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'board-row';
        for (let dc = 0; dc < 8; dc++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const pc = document.createElement('span');
            cell.appendChild(pc);
            cell._pc = pc;
            if (dc === 0) { const l = document.createElement('span'); l.className = 'coord-label rank-label'; cell.appendChild(l); cell._rl = l; }
            if (dr === 7) { const l = document.createElement('span'); l.className = 'coord-label file-label'; cell.appendChild(l); cell._fl = l; }
            boardCells.push(cell);
            rowEl.appendChild(cell);
        }
        el.appendChild(rowEl);
    }
    el.addEventListener('click', function(e) {
        let t = e.target;
        while (t && !t._pc && t !== el) t = t.parentElement;
        if (t && t._sq) onCellClick(t._sq);
    });
}

// ── Interaction ────────────────────────────────────────────
function onCellClick(sq) {
    if (thinking || game.game_over()) return;
    if (game.turn() !== humanColor) return;
    if (selectedSq) {
        if (legalTargets.indexOf(sq) >= 0) {
            const piece = game.get(selectedSq);
            const toRank = parseInt(sq[1]);
            if (piece && piece.type==='p' &&
                ((piece.color==='w'&&toRank===8)||(piece.color==='b'&&toRank===1))) {
                showPromotion(selectedSq, sq); return;
            }
            makeHumanMove(selectedSq, sq);
        } else { selectSquare(sq); }
    } else { selectSquare(sq); }
}

    const piece = game.get(sq);
    if (piece && piece.color===humanColor) {
        selectedSq = sq;
        const seen = {};
        legalTargets = [];
        const vm = game.moves({verbose:true});
        for (let i=0;i<vm.length;i++) {
            if (vm[i].from===sq && !seen[vm[i].to]) { legalTargets.push(vm[i].to); seen[vm[i].to]=true; }
        }

}

    searchDeadline = Infinity;
    const result = game.move(moveSan);
    if (result) { lastMoveSquares = { from: result.from, to: result.to }; moveHistory.push(result.san); }
    thinking = false;
    searchStats = { depth: depth, nodes: nodes };
    renderBoard(); updateMoveList(); updateDashboard();
    if (game.game_over()) handleGameOver();
    else {
        const side = humanColor === 'w' ? 'White' : 'Black';
        setStatus('Your move (' + side + ') \u2014 depth ' + depth + ', ' + nodes.toLocaleString() + ' nodes');
    }
}
function handleGameOver() {
    let msg;
    if (game.in_checkmate()) msg='Checkmate! '+(game.turn()==='w'?'Black':'White')+' wins.';
    else if (game.in_stalemate()) msg='Stalemate \u2014 draw.';
    else if (game.in_threefold_repetition()) msg='Threefold repetition \u2014 draw.';
    else if (game.in_draw()) msg='Draw.';
    else msg='Game over.';
    setStatus(msg);
}

// ── Promotion UI ───────────────────────────────────────────
function showPromotion(from, to) {
    const modal=document.getElementById('promotion-modal');
    const box=document.getElementById('promo-choices');
    const color=game.turn(); box.innerHTML='';
    for (const type of ['q','r','b','n']) {
        const el=document.createElement('div'); el.className='promo-piece';
        el.textContent=PIECE_CHAR[color+type];
        el.addEventListener('click', () => { modal.classList.remove('active'); makeHumanMove(from,to,type); });
        box.appendChild(el);
    }
    modal.classList.add('active');
}

// ── Controls ───────────────────────────────────────────────
function newGame() {
    thinking=false; game=new Chess();
    selectedSq=null; legalTargets=[]; lastMoveSquares=null;
    moveHistory=[]; thermoCache = new Map(); graphData=[];
    renderBoard(); updateMoveList(); updateDashboard();
    if (humanColor==='b') { setStatus('Thinking...'); thinking=true; setTimeout(doAiMove,30); }
    else setStatus('Your move (White)');
}
function undoMove() {
    if (thinking || moveHistory.length<2) return;
    game.undo(); game.undo();
    moveHistory.pop(); moveHistory.pop();
    if (graphData.length>0) graphData.pop();
    if (graphData.length>0) graphData.pop();
    lastMoveSquares=null; selectedSq=null; legalTargets=[];
    renderBoard(); updateMoveList(); updateDashboard();
    setStatus('Your move ('+(humanColor==='w'?'White':'Black')+')');
}
function flipBoard() { boardFlipped=!boardFlipped; renderBoard(); }
function switchSides() {
    if (thinking) return;
    humanColor = humanColor==='w' ? 'b' : 'w';
    aiColor = aiColor==='w' ? 'b' : 'w';
    selectedSq=null; legalTargets=[];
    thermoCache = new Map();
    renderBoard();
    if (!game.game_over() && game.turn()===aiColor) { setStatus('Thinking...'); thinking=true; setTimeout(doAiMove,30); }
    else setStatus('Your move ('+(humanColor==='w'?'White':'Black')+')');
}
function setStatus(msg) { document.getElementById('status').textContent=msg; }
function onHeatCapChange(val) {
    activeC = parseFloat(val) || 1;
    document.getElementById('heatCapVal').textContent = activeC.toFixed(1);
    if (dashTimeout) clearTimeout(dashTimeout);
    dashTimeout = setTimeout(updateDashboard, 120);
}
function updateMoveList() {
    const el=document.getElementById('move-list');
    if (moveHistory.length===0) { el.textContent='Game start'; return; }
    let s='';
    for (let i=0;i<moveHistory.length;i+=2) {
        s+=(i/2+1)+'. '+moveHistory[i];
        if (moveHistory[i+1]) s+=' '+moveHistory[i+1];
        s+='  ';
    }
    el.textContent=s; el.scrollTop=el.scrollHeight;
}

// ── Dashboard ──────────────────────────────────────────────
function updateDashboard() {
    const { Uw, Ub } = rawU(game);
    activeC = parseFloat((document.getElementById('heatCap') || {}).value) || 1;

    let thermo = null;
    let source = '';
    if (!game.game_over()) {
        const depth = parseInt(document.getElementById('dashDepth').value) || 1;
        const saveNC = nodeCount;
        nodeCount = 0;
        thermoCache = new Map();
        thermo = computeThermodynamics(game, depth);
        nodeCount = saveNC;
        source = 'Dashboard analysis (depth ' + depth + ')';
    }

    // Record per-move data
    if (thermo && moveHistory.length > 0 && graphData.length < moveHistory.length) {
        const eval_w = (game.turn() === 'w' ? 1 : -1) * thermo.F / PAWN_XRAY;
        const U_w = (Uw - Ub) / PAWN_XRAY;
        const idx = graphData.length;
        graphData.push({
            halfMove: moveHistory.length, eval_w, T: thermo.T, S: thermo.S,
            side: game.turn(), move: moveHistory[moveHistory.length - 1],
            U: U_w, sfEval: null, fen: game.fen()
        });
        queueSfEval(idx, game.fen());
    }

    renderThermoGrid(Uw, Ub, thermo, source);
    renderMoveTable();
    renderMoveProbs(thermo);
    renderGraph();
}

function fmt(v, d) {
    if (v == null || !Number.isFinite(v)) return '\u2014';
    return v.toFixed(d === undefined ? 2 : d);
}

function renderThermoGrid(Uw, Ub, th, source) {
    const grid = document.getElementById('thermo-grid');
    if (!th) { grid.innerHTML='<span class="dash-label">Game over</span>'; return; }

    const evalSide = game.turn();
    const evalW = evalSide === 'w' ? th.F : -th.F;
    const sign = evalW >= 0 ? '+' : '';

    const rows = [
        ['U_w', fmt(Uw,1), 'U_b', fmt(Ub,1)],
        ['T',   fmt(th.T,4), 'S',  fmt(th.S,4)],
        ['\u27E8Q\u27E9', fmt(th.avgQ,4), 'TS', fmt(th.TS,4)],
        ['F=\u27E8Q\u27E9+TS', fmt(th.F,4), 'Eval', sign+fmt(evalW/PAWN_XRAY,2)+' \u2659'],
    ];

    let html = '<span class="dash-label" style="grid-column:span 4;color:#666;font-size:0.8em;margin-bottom:2px">' +
               source + '</span>';
    for (const r of rows) {
        html += '<span class="dash-label">'+r[0]+'</span><span class="dash-value">'+r[1]+'</span>';
        html += '<span class="dash-label">'+r[2]+'</span><span class="dash-value">'+r[3]+'</span>';
    }
    grid.innerHTML = html;
}

function renderMoveTable() {
    const el = document.getElementById('dash-movehistory');
    if (!el) return;
    if (graphData.length === 0) { el.innerHTML = '<span style="color:#666">No moves yet</span>'; return; }

    const sfStatus = sfWorker ? (sfReady ? '' : ' (loading)') : ' (offline)';
    let html = '<table class="prob-table"><tr><th>#</th><th>Move</th>' +
               '<th style="text-align:right">Eval</th><th style="text-align:right">SF' + sfStatus + '</th>' +
               '<th style="text-align:right">S</th><th style="text-align:right">T</th>' +
               '<th style="text-align:right">U</th></tr>';

    for (let i = 0; i < graphData.length; i++) {
        const d = graphData[i];
        const moveNum = Math.ceil(d.halfMove / 2);
        const isBlack = d.halfMove % 2 === 0;
        const label = isBlack ? moveNum + '...' : moveNum + '.';
        const ev = (d.eval_w >= 0 ? '+' : '') + d.eval_w.toFixed(2);
        const sf = d.sfEval != null ? ((d.sfEval >= 0 ? '+' : '') + (Math.abs(d.sfEval) >= 999 ? (d.sfEval > 0 ? '#' : '-#') : d.sfEval.toFixed(2))) : '\u2026';
        const u = (d.U >= 0 ? '+' : '') + d.U.toFixed(2);
        const bg = isBlack ? ' style="background:rgba(255,255,255,0.03)"' : '';
        html += '<tr' + bg + '><td>' + label + '</td><td>' + (d.move || '') + '</td>' +
                '<td style="text-align:right">' + ev + '</td>' +
                '<td style="text-align:right;color:#8c8">' + sf + '</td>' +
                '<td style="text-align:right">' + d.S.toFixed(2) + '</td>' +
                '<td style="text-align:right">' + d.T.toFixed(1) + '</td>' +
                '<td style="text-align:right">' + u + '</td></tr>';
    }
    html += '</table>';
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
}

function renderMoveProbs(th) {
    const el = document.getElementById('dash-moves');
    if (!th) { el.innerHTML='<span style="color:#666">N/A</span>'; return; }

    const indexed = [];
    for (let i=0;i<th.moves.length;i++)
        indexed.push({ move:th.moves[i], prob:th.probs[i], q:th.Qs[i], isBest:i===th.bestIdx });
    indexed.sort((a,b) => b.prob - a.prob);

    let maxP = 0;
    for (let i=0;i<indexed.length;i++) if (indexed[i].prob>maxP) maxP=indexed[i].prob;

    let html = '<table class="prob-table"><tr><th>Move</th><th style="text-align:right">Q (\u2659)</th>' +
               '<th style="text-align:right">\u03C0</th><th class="prob-bar-cell"></th></tr>';
    const show = Math.min(indexed.length, 20);
    for (let i=0; i<show; i++) {
        const x = indexed[i];
        const barW = Math.max(2, (x.prob/maxP)*100);
        const qs = x.q / PAWN_XRAY;
        const sign = qs >= 0 ? '+' : '';
        const cls = x.isBest ? ' class="best-move-row"' : '';
        html += '<tr'+cls+'><td>'+(x.isBest?'\u25B6 ':'')+x.move+'</td><td style="text-align:right">'+sign+fmt(qs,2)+
                '</td><td style="text-align:right">'+fmt(x.prob,3)+
                '</td><td class="prob-bar-cell"><div class="prob-bar" style="width:'+barW.toFixed(1)+'%"></div></td></tr>';
    }
    if (indexed.length > 20)
        html += '<tr><td colspan="4" style="color:#666">... '+(indexed.length-20)+' more</td></tr>';
    html += '</table>';
    el.innerHTML = html;
}

// ── Turn-by-turn Graph ─────────────────────────────────────
function renderGraph() {
    const canvas = document.getElementById('graph-canvas');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height;

    const variable = document.getElementById('graphVar').value;
    const splitBySide = (variable === 'T' || variable === 'S');

    ctx.clearRect(0, 0, w, h);

    if (graphData.length === 0) {
        ctx.fillStyle = '#555';
        ctx.font = '12px system-ui';
        ctx.fillText('No data yet', 10, h / 2);
        return;
    }

    const pad = { top: 12, right: 10, bottom: 22, left: 42 };
    const pw = w - pad.left - pad.right;
    const ph = h - pad.top - pad.bottom;

    const nTotal = graphData.length;
    function xPos(i) { return pad.left + (nTotal === 1 ? pw/2 : (i/(nTotal-1))*pw); }

    // Build series: eval gets one line; T/S get white + black lines
    let series; // array of { indices, values, color, label }
    if (!splitBySide) {
        const vals = graphData.map(d => d.eval_w);
        series = [{ indices: graphData.map((_,i)=>i), values: vals, color: '#7ec8e3', label: 'Eval' }];
    } else {
        const field = variable === 'T' ? 'T' : 'S';
        const wIdx = [], wVal = [], bIdx = [], bVal = [];
        for (let i = 0; i < nTotal; i++) {
            const d = graphData[i];
            if (d.side === 'w') { wIdx.push(i); wVal.push(d[field]); }
            else                { bIdx.push(i); bVal.push(d[field]); }
        }
        series = [
            { indices: wIdx, values: wVal, color: '#e8e8e8', label: 'White' },
            { indices: bIdx, values: bVal, color: '#f0a050', label: 'Black' }
        ];
    }

    // Compute Y range across all series
    let minY = Infinity, maxY = -Infinity;
    for (const s of series) for (const v of s.values) { if (v < minY) minY = v; if (v > maxY) maxY = v; }
    if (variable === 'eval') { minY = Math.min(minY, -0.5); maxY = Math.max(maxY, 0.5); }
    else { minY = Math.min(minY, 0); maxY = Math.max(maxY, 0.5); }
    if (maxY - minY < 0.1) { maxY += 0.25; minY -= 0.25; }
    const rangeY = maxY - minY;
    function yPos(v) { return pad.top + ph * (1 - (v - minY) / rangeY); }

    // Horizontal grid lines
    ctx.strokeStyle = '#2a2a3e';
    ctx.lineWidth = 1;
    const nGrid = 4;
    for (let i = 0; i <= nGrid; i++) {
        const y = pad.top + (i / nGrid) * ph;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    }

    // Zero line for eval
    if (variable === 'eval' && minY < 0 && maxY > 0) {
        const zy = yPos(0);
        ctx.strokeStyle = '#444';
        ctx.setLineDash([4, 3]);
        ctx.beginPath(); ctx.moveTo(pad.left, zy); ctx.lineTo(w - pad.right, zy); ctx.stroke();
        ctx.setLineDash([]);
    }

    // Draw each series
    for (const s of series) {
        if (s.values.length === 0) continue;
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let j = 0; j < s.indices.length; j++) {
            const x = xPos(s.indices[j]), y = yPos(s.values[j]);
            if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.fillStyle = s.color;
        for (let j = 0; j < s.indices.length; j++) {
            ctx.beginPath();
            ctx.arc(xPos(s.indices[j]), yPos(s.values[j]), 2.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Legend for split graphs
    if (splitBySide && series.length === 2) {
        ctx.font = '10px Consolas, Menlo, monospace';
        let lx = pad.left + 4;
        for (const s of series) {
            ctx.fillStyle = s.color;
            ctx.fillRect(lx, pad.top, 10, 3);
            ctx.fillText(s.label, lx + 13, pad.top + 4);
            lx += ctx.measureText(s.label).width + 24;
        }
    }

    // Y-axis labels
    ctx.fillStyle = '#888';
    ctx.font = '10px Consolas, Menlo, monospace';
    ctx.textAlign = 'right';
    for (let i = 0; i <= nGrid; i++) {
        const val = maxY - (i / nGrid) * rangeY;
        ctx.fillText(val.toFixed(1), pad.left - 5, pad.top + (i / nGrid) * ph + 3);
    }

    // X-axis labels
    ctx.textAlign = 'center';
    const step = Math.max(1, Math.ceil(nTotal / 10));
    for (let i = 0; i < nTotal; i += step) {
        ctx.fillText(String(graphData[i].halfMove), xPos(i), h - 4);
    }
}

// ── Init ───────────────────────────────────────────────────
(function init() {
    if (typeof Chess === 'undefined') {
        document.getElementById('status').textContent = 'Error: chess.js failed to load.';
        document.getElementById('status').style.color = '#ff6b6b';
        return;
    }
    renderBoard();
    updateMoveList();
    updateDashboard();
    initStockfish();
})();
</script>
